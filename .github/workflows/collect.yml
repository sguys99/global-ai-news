name: collect

# 일 1회 자동 수집 + 수동/관리자 콘솔 트리거(workflow_dispatch).
# scripts/collect.ts 실행 → data/app.db 변경분만 deploy/github-pages 에 커밋·푸시
# → DB 변경 시 deploy.yml(GitHub Pages 정적 배포)을 명시적으로 workflow_dispatch 한다.
#   (빌트인 GITHUB_TOKEN 의 push 이벤트는 다른 워크플로를 트리거하지 못하므로 —
#    재귀 방지 정책 — push 트리거에 기대지 않고 직접 dispatch 한다. dispatch 는 예외로 동작.)
# 관리자 콘솔(src/lib/github.ts)이 정확히 이 파일명("collect.yml")으로 dispatch 한다.

on:
  schedule:
    - cron: "0 21 * * *" # 21:00 UTC = 06:00 KST 매일 1회
  workflow_dispatch: {} # 관리자 콘솔 "재수집" + 수동 실행

# 동시에 두 실행이 app.db 를 쓰지 않도록 직렬화(취소하지 않고 대기).
concurrency:
  group: collect
  cancel-in-progress: false

permissions:
  contents: write # data/app.db 커밋/푸시 (빌트인 GITHUB_TOKEN 사용, 별도 PAT 불필요)
  actions: write # deploy.yml 을 workflow_dispatch 로 트리거

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # 수집·LLM 가공에 필요한 비밀은 이 잡의 env 로만 주입(로그 echo 금지).
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
      REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
      # GitHub Search 레이트리밋 완화용(선택). GITHUB_ 접두 시크릿명은 금지되므로
      # GH_SEARCH_PAT 시크릿을 GITHUB_PAT 환경변수에 매핑한다.
      GITHUB_PAT: ${{ secrets.GH_SEARCH_PAT }}
      LLM_MODEL: ${{ vars.LLM_MODEL }}
      MAX_ITEMS_PER_RUN: ${{ vars.MAX_ITEMS_PER_RUN }}
    steps:
      # 배포 트리거 브랜치로 고정 정렬. schedule 실행은 기본 브랜치 컨텍스트로 돌므로
      # deploy/github-pages 를 명시 checkout 해 동일 브랜치에 커밋·push 한다.
      - uses: actions/checkout@v4
        with:
          ref: deploy/github-pages

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run collect (record exit code, never fail here)
        id: collect
        # collect.ts 는 status=failed 일 때만 exit 1. 실패해도 run 행은 이미
        # finally 에서 기록되므로, 여기서 잡을 죽이지 않고 DB 를 커밋해 /admin 에 노출한다.
        run: |
          set +e
          npm run collect
          echo "code=$?" >> "$GITHUB_OUTPUT"

      - name: Commit & push DB if changed
        id: commit
        # 배포 트리거 브랜치 고정. DB 변경 시 changed=true 를 출력해 다음 스텝이 배포를 dispatch.
        env:
          DEPLOY_BRANCH: deploy/github-pages
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data/app.db; then
            echo "no DB change — nothing to commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git add data/app.db
          git commit -m "chore(data): daily collect $(date -u +%Y-%m-%d)"
          # 푸시 경쟁(다른 커밋이 먼저 들어온 경우) 대비 rebase 후 재시도.
          for i in 1 2 3; do
            git pull --rebase --autostash origin "${DEPLOY_BRANCH}" \
              && git push origin "HEAD:${DEPLOY_BRANCH}" \
              && break
            echo "push attempt $i failed — retrying"
            sleep 5
          done
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Pages deploy
        # GITHUB_TOKEN push 는 워크플로를 트리거하지 못하므로 deploy.yml 을 명시적으로 dispatch.
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref deploy/github-pages

      - name: Reflect pipeline health in run status
        # 잡 배지를 파이프라인 건강도(성공률 KPI)에 맞춘다. DB 커밋은 이미 끝났다.
        if: always()
        run: exit ${{ steps.collect.outputs.code || 0 }}
